<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Master Your Fate RPG - Race Select</title>
    <link rel="stylesheet" href="css/style-myfrpg.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manufacturing+Consent&family=Russo+One&display=swap"
        rel="stylesheet">
</head>

<body class="all-other-pages">
    <main>
        <div class="mainSelect">
            <div class="headerBox">
                <h3 class="pageTitle">Choose your Lineage</h3>
            </div>

            <!-- Races Images Container -->
            <div class="gallery-container">

                <!-- Dwarves -->
                <div class="gallery-item lockSelect" data-race="dwarf">
                    <div class="image-wrapper">
                        <img src="img/dwarf-kingdom.png" alt="Image A1">
                        <img src="img/dwarf-battle.png" alt="Image B1">
                        <img src="img/dwarf-battle.png" alt="Image C1">
                    </div>

                    <div class="image-name"></div>

                    <!-- Hidden text source -->
                    <div class="describe-main hidden"></div>
                    <div class="describe-extra hidden">
                        <span class='racials'><strong></strong></span><br>
                        <span class='racials'><strong></strong></span><br>
                        <span class='racials'><strong></strong></span><span>
                    </div>
                </div>

                <!-- Elves -->
                <div class="gallery-item lockSelect" data-race="elf">
                    <div class="image-wrapper">
                        <img src="" alt="Image of an Elf Kingdom">
                        <img src="" alt="Image of Elves in Battle">
                        <img src="" alt="Image of Elves in Battle">
                    </div>

                    <div class="image-name"></div>

                    <!-- Hidden text source -->
                    <div class="describe-main hidden"></div>
                    <div class="describe-extra hidden">
                        <span class='racials'><strong></strong></span><br>
                        <span class='racials'><strong></strong></span><br>
                        <span class='racials'><strong></strong></span><span>
                    </div>
                </div>

                <!-- Humans -->
                <div class="gallery-item lockSelect" data-race="human">
                    <div class="image-wrapper">
                        <img src="" alt="Image of a Human Kingdom">
                        <img src="" alt="Image of Humans in Battle">
                        <img src="" alt="Image of Humans in Battle">
                    </div>

                    <div class="image-name"></div>

                    <!-- Hidden text source -->
                    <div class="describe-main hidden"></div>
                    <div class="describe-extra hidden">
                        <span class='racials'><strong></strong></span><br>
                        <span class='racials'><strong></strong></span><br>
                        <span class='racials'><strong></strong></span><span>
                    </div>
                </div>

                <!-- Hearthkin -->
                <div class="gallery-item lockSelect" data-race="hearthkin">
                    <div class="image-wrapper">
                        <img src="" alt="Image of a Hearthkin Village">
                        <img src="" alt="Image of Hearthkin in Battle">
                        <img src="" alt="Image of Hearthkin in Battle">
                    </div>

                    <div class="image-name"></div>

                    <!-- Hidden text source -->
                    <div class="describe-main hidden"></div>
                    <div class="describe-extra hidden">
                        <span class='racials'><strong></strong></span><br>
                        <span class='racials'><strong></strong></span><br>
                        <span class='racials'><strong></strong></span><span>
                    </div>
                </div>

                <!-- Catlans -->
                <div class="gallery-item lockSelect" data-race="catlan">
                    <div class="image-wrapper">
                        <img src="" alt="Image of a Catlan Kingdom">
                        <img src="" alt="Image of Catlans in Battle">
                        <img src="" alt="Image of Catlans in Battle">
                    </div>

                    <div class="image-name"></div>

                    <!-- Hidden text source -->
                    <div class="describe-main hidden"></div>
                    <div class="describe-extra hidden">
                        <span class='racials'><strong></strong></span><br>
                        <span class='racials'><strong></strong></span><br>
                        <span class='racials'><strong></strong></span><span>
                    </div>
                </div>
            </div>


            <!-- Info Text Containers -->
            <div class="gameText" id="shortDescriptionContainer">
                <p id="mainInfoText" class="centerText textInfo">The people you descend from shape the strength
                    within
                    you</p>
            </div>
            <!-- Racial Bonuses Containers -->
            <div class="extraInfo">
                <p id="extraInfoText" class="textInfo">Racial Strenghts and Passives</p>
            </div>

            <!-- Only one button visible for intro -->
            <div id="standardBtnContainer">
                <button id="confirmBtn" class="confirmProceed">Confirm and Proceed</button>
            </div>
        </div>
    </main>
    <!-- Modal for small screens -->
    <div id="mobileModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modalMainText"></div>
            <div id="modalExtraInfo"></div>
            <button id="confirmNext" class="confirmProceed">Confirm and Proceed</button>
        </div>
    </div>

    <script src="js/script-myfrpg.js"></script>

</body>

</html>
